<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة إكس أو</title>
    <style>
        body { font-family: Tahoma, Arial, sans-serif; background-color: #2c3e50; color: white; text-align: center; margin-top: 50px; }
        h1 { color: #f1c40f; font-size: 36px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 10px; justify-content: center; margin: 30px auto; }
        .cell { width: 100px; height: 100px; background-color: #34495e; font-size: 60px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 15px; transition: background-color 0.2s, transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .cell:hover { background-color: #3b536b; transform: translateY(-2px); }
        .cell:active { transform: translateY(2px); }
        .cell.x { color: #3498db; }
        .cell.o { color: #e74c3c; }
        button { padding: 12px 30px; font-size: 18px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.3s;}
        button:hover { background-color: #27ae60; transform: scale(1.05); }
        #message { font-size: 24px; margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 10px; background-color: rgba(0,0,0,0.2); display: inline-block; min-width: 200px; }
    </style>
</head>
<body>
    <h1>لعبة إكس أو 🎮</h1>
    <div id="message">دور اللاعب: <span style="color: #3498db;">X</span></div>
    
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(this, 0)"></div>
        <div class="cell" onclick="makeMove(this, 1)"></div>
        <div class="cell" onclick="makeMove(this, 2)"></div>
        <div class="cell" onclick="makeMove(this, 3)"></div>
        <div class="cell" onclick="makeMove(this, 4)"></div>
        <div class="cell" onclick="makeMove(this, 5)"></div>
        <div class="cell" onclick="makeMove(this, 6)"></div>
        <div class="cell" onclick="makeMove(this, 7)"></div>
        <div class="cell" onclick="makeMove(this, 8)"></div>
    </div>
    
    <button onclick="resetGame()">إعادة اللعب 🔄</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        // احتمالات الفوز (صفوف، أعمدة، أقطار)
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], 
            [0, 3, 6], [1, 4, 7], [2, 5, 8], 
            [0, 4, 8], [2, 4, 6]             
        ];

        function makeMove(cell, index) {
            // إذا كان المربع ممتلئاً أو اللعبة انتهت، لا تفعل شيئاً
            if (board[index] !== "" || !gameActive) return;

            // تسجيل الحركة
            board[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());

            checkWin();
        }

        function checkWin() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                document.getElementById("message").innerHTML = `🎉 الفائز هو: <span class="${currentPlayer.toLowerCase()}">${currentPlayer}</span>!`;
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                document.getElementById("message").innerText = "🤝 تعادل!";
                document.getElementById("message").style.color = "#f1c40f";
                gameActive = false;
                return;
            }

            // تبديل الدور
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            let nextColor = currentPlayer === "X" ? "#3498db" : "#e74c3c";
            document.getElementById("message").innerHTML = `دور اللاعب: <span style="color: ${nextColor};">${currentPlayer}</span>`;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            document.getElementById("message").innerHTML = `دور اللاعب: <span style="color: #3498db;">X</span>`;
            document.getElementById("message").style.color = "white";
            document.querySelectorAll(".cell").forEach(cell => {
                cell.innerText = "";
                cell.classList.remove("x", "o");
            });
        }
    </script>
</body>
</html>
